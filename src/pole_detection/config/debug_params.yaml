pole_detection:
  ros__parameters:
    # Clusterer - LOW threshold for sparse data
    cluster_tolerance: 0.08
    cluster_min_size: 3
    cluster_max_size: 50
    
    # Validator - SIMPLE checks
    expected_radius: 0.028
    radius_tolerance: 0.008
    min_range: 0.15
    max_range: 0.6
    max_radial_extent: 0.1
    
    # Tracker - AGGRESSIVE
    max_tracks: 10
    association_distance: 0.2
    max_invisible_frames: 30
    
    # Pattern Matcher - WITH HARMONICS
    enable_pattern_matching: true
    expected_inter_pole_distances: [0.185]
    distance_match_tolerance: 0.05
    
    # Debug - ALL ON
    publish_debug_clusters: true
    publish_debug_validation: true
    publish_debug_tracks: true
    publish_debug_pattern: true