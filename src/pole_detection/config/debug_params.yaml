# Debug Configuration - All debug topics ENABLED, optimized for static poles + moving LiDAR
pole_detection:
  ros__parameters:
    # ========================================
    # Clusterer Parameters (TIGHTER for separation)
    # ========================================
    cluster_tolerance: 0.04        # Reduced from 0.08 → 4cm for better pole/wall separation
    cluster_min_size: 3            # Handle very sparse returns (2+ points)
    cluster_max_size: 30           # Poles are small objects
    
    # ========================================
    # Validator Parameters (AREA-BASED, NO RADIUS!)
    # ========================================
    # Point count filtering
    min_point_count: 3             # Minimum 3 points (hallucination prevention)
    max_point_count: 30            # Maximum points
    
    # Bounding box area filtering (REPLACES RADIUS!)
    # Expected pole area: 3mm×3mm to 50mm×50mm
    min_bbox_area: 0.0003          # 300mm² minimum
    max_bbox_area: 0.0025          # 2500mm² maximum
    
    # Radial width (max dimension, NOT RADIUS!)
    min_radial_width: 0.010        # 10mm minimum
    max_radial_width: 0.050        # 50mm maximum
    
    # Range filtering
    max_range: 0.8                 # Maximum reliable detection range
    
    # Deleted: expected_radius, radius_tolerance (NO LONGER USED!)
    
    # Weights
    weight_point_count: 0.30
    weight_bbox_area: 0.35         # PRIMARY FEATURE
    weight_radial_width: 0.25
    weight_range: 0.10
    
    # ========================================
    # Tracker Parameters (WORLD-FRAME OPTIMIZED)
    # ========================================
    max_tracks: 8                 # Allow extra tracks for debugging
    association_distance: 0.1       # Tighter in world frame (10cm)
    max_invisible_frames: 20       # Keep tracks longer (3 seconds)
    confirmation_threshold: 2       # Confirm faster with multiple viewpoints
    
    # ========================================
    # Pattern Matcher Parameters (HARMONICS + WORLD)
    # ========================================
    enable_pattern_matching: true
    expected_inter_pole_distances: [0.185]  # 185mm spacing
    distance_match_tolerance: 0.01          # ±1cm tolerance
    
    # Strict colinearity parameters
    require_colinearity: true               # ENFORCE straight line
    colinearity_tolerance: 0.01             # ±2cm from line
    min_poles_for_pattern: 3                # At least 4 poles required
    
    # Harmonics DISABLED for strict mode
    enable_harmonics: false

    # ========================================
    # Motion Gating Parameters
    # ========================================
    max_linear_velocity: 0.3        # Skip processing if robot moving >0.3 m/s
    max_angular_velocity: 0.3       # Skip processing if rotating >0.3 rad/s
    
    # ========================================
    # Debug Publishing (ALL ON)
    # ========================================
    publish_debug_clusters: true
    publish_debug_validation: true
    publish_debug_tracks: true
    publish_debug_pattern: true