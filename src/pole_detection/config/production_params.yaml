# Production Configuration - Optimized for performance, debug publishing OFF
pole_detection:
  ros__parameters:
    # ========================================
    # Preprocessor Parameters (REMOVED - using raw clouds)
    # ========================================
    # Note: Preprocessing disabled for maximum sensitivity
    range_min: 0.2              # Kept for parameter compatibility
    range_max: 0.8
    z_min: -0.3
    z_max: 0.3
    voxel_leaf_size: 0.01
    use_intensity_filter: false  # Disabled - unreliable
    min_intensity: 50.0
    
    # ========================================
    # Clusterer Parameters (RELAXED for stability - from rc2026_head_finder)
    # ========================================
    cluster_tolerance: 0.08        # 8cm - proper pole separation (from rc2026)
    cluster_min_size: 4            # 4 points - filter noise better
    cluster_max_size: 35           # 35 points - allow full pole detection
    
    # ========================================
    # validator Parameters (STRICT FILTERING)
    # ========================================
    # Angular span filtering
    min_angular_span: 10.0         # Slightly stricter than debug
    max_angular_span: 30.0         # Slightly stricter
    
    # Point count filtering  
    min_point_count: 3
    max_point_count: 20          # Stricter than debug
    
    # Radial width filtering (KEY FOR WALL SEPARATION)
    min_radial_width: 0.006        # 6mm minimum
    max_radial_width: 0.04         # 4cm maximum (stricter wall rejection)
    
    # Range filtering
    max_range: 0.7                 # Slightly shorter than debug
    
    # Legacy parameters
    expected_radius: 0.028
    radius_tolerance: 0.008
    use_intensity_stats: false
    min_intensity: 50.0
    
    # ========================================
    # Tracker Parameters (TIGHTER for stability - match relaxed clustering)
    # ========================================
    max_tracks: 8                  # Reasonable limit
    association_distance: 0.05     # Very tight in world frame (5cm - match clustering)
    max_invisible_frames: 25       # Moderate persistence
    confirmation_threshold: 3      # Require 3 detections
    
    # NEW: rc2026_head_finder improvements (OPTIMIZED)
    ema_alpha: 0.10                # EMA smoothing factor (10% new, 90% old - very smooth)
    max_jump_distance: 0.5         # Jump detection threshold (50cm)
    
    # ========================================
    # Pattern Matcher Parameters (PRECISE)
    # ========================================
    enable_pattern_matching: true
    expected_inter_pole_distances: [0.185]
    distance_match_tolerance: 0.01  # ±1cm tolerance
    
    # ========================================
    # Motion Gating Parameters (STRICT)
    # ========================================
    max_linear_velocity: 0.2        # More strict than debug
    max_angular_velocity: 0.2       # More strict than debug
    
    # ========================================
    # Debug Publishing (ALL OFF for production)
    # ========================================
    publish_debug_clusters: false
    publish_debug_validation: false
    publish_debug_tracks: false
    publish_debug_pattern: false
    publish_pipeline_debug: false     # NEW: Comprehensive pipeline visualization