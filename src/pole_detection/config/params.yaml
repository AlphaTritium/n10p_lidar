# Unified Configuration - Combines production stability with debug visibility
pole_detection:
  ros__parameters:
    # ========================================
    # Preprocessor Parameters (REMOVED - using raw clouds)
    # ========================================
    # Note: Preprocessing disabled for maximum sensitivity
    range_min: 0.2              # Kept for parameter compatibility
    range_max: 0.8
    z_min: -0.3
    z_max: 0.3
    voxel_leaf_size: 0.01
    use_intensity_filter: false  # Disabled - unreliable
    min_intensity: 50.0
    
    # ========================================
    # Clusterer Parameters (RELAXED for stability - from rc2026_head_finder)
    # ========================================
    cluster_tolerance: 0.08        # 8cm - proper pole separation (from rc2026)
    cluster_min_size: 4            # 4 points - filter noise better
    cluster_max_size: 35           # 35 points - allow full pole detection (production value)
    
    # ========================================
    # Validator Parameters (AREA-BASED, NO RADIUS!)
    # ========================================
    # Point count filtering
    min_point_count: 3             # Minimum 3 points (hallucination prevention)
    max_point_count: 20            # Maximum points (production value for stricter filtering)
    
    # Bounding box area filtering (REPLACES RADIUS!)
    # Expected pole area: 3mm×3mm to 50mm×50mm
    min_bbox_area: 0.0003          # 300mm² minimum
    max_bbox_area: 0.0025          # 2500mm² maximum
    
    # Radial width (max dimension, NOT RADIUS!)
    min_radial_width: 0.010        # 10mm minimum
    max_radial_width: 0.040        # 40mm maximum (production value for stricter wall rejection)
    
    # Range filtering
    max_range: 0.7                 # Maximum reliable detection range (production value)
    
    # Angular span filtering (from production)
    min_angular_span: 10.0         # Slightly stricter than debug
    max_angular_span: 30.0         # Slightly stricter
    
    # Acceptance threshold
    acceptance_threshold: 0.60     # Score ≥ 0.60 → accept candidate
    
    # Weights
    weight_point_count: 0.30
    weight_bbox_area: 0.35         # PRIMARY FEATURE
    weight_radial_width: 0.25
    weight_range: 0.10
    
    # ========================================
    # Debug Visualization Parameters
    # ========================================
    publish_debug_clusters: true    # Orange spheres for raw clusters
    publish_debug_validation: true  # Green/red spheres for accepted/rejected
    publish_debug_tracks: true      # Yellow/green spheres for tracked poles
    publish_debug_pattern: true     # Blue lines for pattern matches
    
    # ========================================
    # Tracker Parameters (TIGHTER for stability - match relaxed clustering)
    # ========================================
    max_tracks: 8                  # Reasonable limit
    association_distance: 0.05     # Very tight in world frame (5cm - match clustering)
    max_invisible_frames: 25       # Moderate persistence (production value)
    confirmation_threshold: 3      # Require 3 detections (production value)
    
    # NEW: rc2026_head_finder improvements (OPTIMIZED)
    ema_alpha: 0.10                # EMA smoothing factor (10% new, 90% old - very smooth, production value)
    max_jump_distance: 0.5         # Jump detection threshold (50cm)
    
    # ========================================
    # Pattern Matcher Parameters (HARMONICS + WORLD)
    # ========================================
    enable_pattern_matching: true
    expected_inter_pole_distances: [0.185]  # 185mm spacing
    distance_match_tolerance: 0.01          # ±1cm tolerance
    
    # Strict colinearity parameters
    require_colinearity: true               # ENFORCE straight line
    colinearity_tolerance: 0.01             # ±2cm from line
    min_poles_for_pattern: 3                # At least 3 poles required
    
    # Harmonics DISABLED for strict mode
    enable_harmonics: false

    # ========================================
    # Motion Gating Parameters (STRICT)
    # ========================================
    max_linear_velocity: 0.2        # More strict than debug (production value)
    max_angular_velocity: 0.2       # More strict than debug (production value)
    
    # ========================================
    # Debug Publishing (CONFIGURABLE)
    # ========================================
    # Set to true for debugging, false for production
    publish_debug_clusters: true
    publish_debug_validation: true
    publish_debug_tracks: false         # DISABLED - using unified visualization
    publish_debug_pattern: true
    publish_pipeline_debug: true     # Comprehensive pipeline visualization